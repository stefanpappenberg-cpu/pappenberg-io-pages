<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex">
    <title>Wartungsmodus</title>
    <style>
      :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, sans-serif; }
      * { box-sizing: border-box; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; color: #22211f; background: #f1eee7; }
      main { width: min(620px, calc(100% - 40px)); padding: 54px; background: rgba(255,255,255,.78); border: 1px solid rgba(34,33,31,.12); border-radius: 24px; box-shadow: 0 24px 80px rgba(40,35,28,.08); }
      span { display: inline-block; margin-bottom: 48px; font-size: 12px; letter-spacing: .14em; text-transform: uppercase; color: #8a5d42; }
      h1 { margin: 0; max-width: 12ch; font-family: Georgia, serif; font-size: clamp(42px, 8vw, 72px); font-weight: 400; line-height: .98; }
      p { max-width: 44ch; margin: 28px 0 0; color: #65615b; line-height: 1.7; }
    </style>
  </head>
  <body>
    <main>
      <span>Kurze Pause</span>
      <h1>Wir sind gleich wieder da.</h1>
      <p>Diese Website wird gerade aktualisiert. Bitte versuchen Sie es in Kürze erneut.</p>
    </main>
  </body>
</html>
